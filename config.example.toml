# S.A.M Mission Control — Config File
# Save to ~/.config/sam/config.toml
# Or run: sam setup

[database]
host = "127.0.0.1"
port = 3306
user = "root"
password = "your_password"
database = "sam_fleet"

[tui]
theme = "standard"
background = "dark"
refresh_interval = 30
chat_poll_interval = 3
vim_mode = false

[identity]
user = "operator"
