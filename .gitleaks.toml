title = "SAM Mission Control — Gitleaks Config"

[extend]
useDefault = true

# Additional rule: MySQL connection strings with embedded passwords
[[rules]]
id = "mysql-connection-string"
description = "MySQL connection string with embedded password"
regex = '''mysql://[^:@\s]+:[^@\s]{4,}@'''
tags = ["database", "credentials"]
[rules.allowlist]
# Skip regex patterns, test assertions, and sanitization helper strings
regexTarget = "line"
regexes = [
    '''assert_eq!''',
    '''assert!''',
    '''Regex::new''',
    '''let msg\s*=''',
]

# Additional rule: hardcoded private 10.x.x.x IPs (internal infrastructure)
[[rules]]
id = "internal-ip-10"
description = "Hardcoded internal IP address (10.x.x.x)"
regex = '''\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b'''
tags = ["ip", "internal"]
[rules.allowlist]
regexes = [
    '''#.*\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b''',   # comments
    '''\b10\.0\.0\.\d{1,3}\b''',                    # documentation example range
]

# Additional rule: hardcoded private 192.168.x.x IPs
[[rules]]
id = "internal-ip-192"
description = "Hardcoded internal IP address (192.168.x.x)"
regex = '''\b192\.168\.\d{1,3}\.\d{1,3}\b'''
tags = ["ip", "internal"]

# Global allowlist — example files and documentation never contain real secrets
[allowlist]
description = "Known safe files with placeholder or example values"
paths = [
    '''(^|/)\.gitleaks\.toml$''',
    '''\.example\.(toml|env|yaml|yml|json)$''',
    '''config\.example\.toml$''',
    '''fleet\.example\.toml$''',
    '''\.env\.example$''',
    '''(^|/)README\.md$''',
    '''(^|/)docs/''',
    '''(^|/)LICENSE$''',
]
